<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Black background -->
  <rect width="512" height="512" fill="#000000"/>

  <!-- F — white serif, left side -->
  <!-- Vertical stroke -->
  <rect x="118" y="148" width="34" height="216" fill="#FFFFFF"/>
  <!-- Top horizontal -->
  <rect x="118" y="148" width="130" height="34" fill="#FFFFFF"/>
  <!-- Middle horizontal -->
  <rect x="118" y="240" width="100" height="28" fill="#FFFFFF"/>

  <!-- Gold diagonal slash — center -->
  <line x1="222" y1="380" x2="290" y2="132" stroke="#D4AF37" stroke-width="28" stroke-linecap="round"/>

  <!-- W — gold, right side -->
  <!-- Left outer leg -->
  <line x1="264" y1="148" x2="295" y2="364" stroke="#D4AF37" stroke-width="26" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Left inner leg up -->
  <line x1="295" y1="364" x2="326" y2="248" stroke="#D4AF37" stroke-width="26" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Right inner leg down -->
  <line x1="326" y1="248" x2="357" y2="364" stroke="#D4AF37" stroke-width="26" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Right outer leg -->
  <line x1="357" y1="364" x2="394" y2="148" stroke="#D4AF37" stroke-width="26" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
